<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Event image placeholder</title>
  <desc id="desc">A decorative placeholder image for event cards and details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)" />
  <circle cx="180" cy="120" r="90" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="1020" cy="520" r="130" fill="#ffffff" fill-opacity="0.1" />
  <g fill="#ffffff" fill-opacity="0.92" transform="translate(160 190)">
    <rect x="0" y="0" width="60" height="60" rx="10" />
    <rect x="80" y="14" width="420" height="16" rx="8" />
    <rect x="80" y="40" width="280" height="12" rx="6" fill-opacity="0.72" />
    <rect x="0" y="110" width="520" height="12" rx="6" fill-opacity="0.6" />
    <rect x="0" y="136" width="460" height="12" rx="6" fill-opacity="0.6" />
    <rect x="0" y="162" width="390" height="12" rx="6" fill-opacity="0.6" />
  </g>
</svg>
